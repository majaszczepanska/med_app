version: '3.8'
services:
  db:
    image: postgres:15
    container_name: medapp_db
    environment:
      POSTGRES_DB: medapp_db        
      POSTGRES_USER: postgres    
      POSTGRES_PASSWORD: admin   
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: medapp_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/medapp_db
  
  frontend:
    build: ./frontend
    container_name: medapp_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    
volumes:
  postgres_data: